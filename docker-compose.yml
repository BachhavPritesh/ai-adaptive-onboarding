version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: onboarding-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - onboarding-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: onboarding-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/onboardai
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=7d
      - CLIENT_URL=http://localhost
    depends_on:
      - mongodb
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - onboarding-network
    restart: unless-stopped

  # Frontend with Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: onboarding-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - onboarding-network
    restart: unless-stopped

networks:
  onboarding-network:
    driver: bridge

volumes:
  mongodb_data:
  backend_uploads:
